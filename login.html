<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Portal Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e3a8a,#06b6d4);
    overflow:hidden;
}

.login-container{
    width:400px;
    padding:40px;
    border-radius:20px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(15px);
    box-shadow:0 8px 32px rgba(0,0,0,0.3);
    text-align:center;
    color:white;
}

.login-container h1{
    margin-bottom:10px;
    font-size:32px;
}

.login-container p{
    margin-bottom:25px;
    color:#dbeafe;
}

.input-group{
    margin-bottom:20px;
}

.input-group input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    outline:none;
    font-size:16px;
}

.login-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#06b6d4;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

.login-btn:hover{
    transform:translateY(-2px);
    background:#0891b2;
}

.footer-text{
    margin-top:20px;
    font-size:14px;
    color:#dbeafe;
}

</style>
</head>

<body>

<div class="login-container">

    <h1>Student Portal</h1>
    <p>Login with Roll Number & Password</p>

    <div class="input-group">
        <input
        type="text"
        id="rollNumber"
        placeholder="Enter Roll Number">
    </div>

    <div class="input-group">
        <input
        type="password"
        id="password"
        placeholder="Enter Password">
    </div>

    <button class="login-btn" onclick="login()">
        Login
    </button>
<a href="dashboard.html">
    <div class="footer-text">
        Student Management System
    </a>
    </div>
</div>

<script>

async function login(){

    const rollNumber =
    document.getElementById("rollNumber").value;

    const password =
    document.getElementById("password").value;

    try{

        const response =
        await fetch("http://localhost:5000/login",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                rollNumber,
                password
            })
        });

        const data = await response.json();

        if(data.success){

            localStorage.setItem(
                "student",
                JSON.stringify(data.student)
            );

            window.location.href =
            "dashboard.html";

        }else{

            alert("Invalid Roll Number or Password");

        }

    }catch(error){

        alert("Server Connection Error");

    }

}

</script>

</body>
</html>
